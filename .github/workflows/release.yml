name: Release Obsidian plugin
on:
    push:
        tags:
            - '*'
jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            # 1. Componente: Inyectar la CLI de pnpm antes de configurar Node.js
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9 # Mantiene la versión estable actual de pnpm

            # 2. Componente: Configurar Node con la estrategia de caché para pnpm
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm' # Busca de manera estricta el archivo pnpm-lock.yaml

            # 3. Función: Construcción del entorno con comandos de pnpm
            - name: Build plugin
              run: |
                  pnpm install --frozen-lockfile # Equivalente estricto a npm ci
                  pnpm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  gh release create "$tag" \
                    --title="$tag" \                    --draft \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

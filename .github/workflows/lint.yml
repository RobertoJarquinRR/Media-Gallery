name: Node.js build

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x, 22.x, 24.x]
                # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

        steps:
            - uses: actions/checkout@v6

            # 1. Componente: Inyectar la CLI de pnpm antes de la matriz de Node.js
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            # 2. Componente: Configurar Node dinámicamente con soporte de caché para pnpm
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'pnpm' # Mapea el hash basándose en pnpm-lock.yaml

            # 3. Funciones: Comandos de ejecución nativos de pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build --if-present
            - run: pnpm run lint
